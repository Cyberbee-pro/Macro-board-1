name: PlatformIO Arch Linux Firmware CI

on:
  push:
    branches: [ main, master ]

# 🟢 PATCH 1: Force GitHub to grant this specific runner write permissions to repository contents
permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Initialize Arch Package Repositories
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git python python-pip gcc

      # CRITICAL: We need a secure checkout token to let the bot write data back
      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Install PlatformIO Core CLI
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade platformio
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Compile Firmware Targets
        run: |
          source .venv/bin/activate
          pio run

      # 🟢 THE BOT IDENTITY: Force the automated container to log in as a user
      - name: GitHub-BIN-COMPILER
        run: |
          mkdir -p production_builds
          cp .pio/build/esp32dev/firmware.bin production_builds/esp32-macroboard-latest.bin || true

          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add production_builds/*.bin
          
          if ! git diff --cached --quiet; then
            git commit -m "//: Automated Firmware Compile: Build Asset Update"
            
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes detected in firmware layout bytes. Skipping commit sweep."
          fi