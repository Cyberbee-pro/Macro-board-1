name: Firmware Release Router Execution

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  route-release:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Initialize Arch Package Repositories
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git python python-pip gcc jq

      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full tag history safely

      - name: Parse Versioning and Handle Edge Cases
        id: versioning
        # 🟢 FIX 1: Pass the commit message as a secure environment variable 
        # to prevent special characters or quotes from breaking the shell script.
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          echo "Processing Commit Message safely via environment variables."

          # Strict flag isolation tracking using word boundaries
          if [[ "$COMMIT_MSG" =~ -prod($|[[:space:]]) ]]; then
            echo "SHOULD_RELEASE=true" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
            echo "🎯 Target Type: OFFICIAL PRODUCTION RELEASE"
          elif [[ "$COMMIT_MSG" =~ -noprod($|[[:space:]]) ]]; then
            echo "SHOULD_RELEASE=true" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "🧪 Target Type: NON-PRODUCTION PRE-RELEASE"
          else
            echo "SHOULD_RELEASE=false" >> $GITHUB_OUTPUT
            echo "No release flags detected. Proceeding with compilation check only."
          fi

          # Safe trailing version regex capture
          EXP_VERSION=$(echo "$COMMIT_MSG" | grep -oE -- '-[0-9]+$' | tr -d '-' || true)

          if [ ! -z "$EXP_VERSION" ]; then
            EXP_VERSION=$((10#$EXP_VERSION)) # Force base-10 numerical evaluation
          fi

          # 🟢 FIX 2: Added standard error redirection (2>/dev/null) to ensure 
          # empty repository history doesn't crash the pipeline on boot.
          LATEST_TAG=$(git tag -l "v*" 2>/dev/null | sort -V 2>/dev/null | tail -n 1 2>/dev/null || echo "")
          
          if [ -z "$LATEST_TAG" ]; then
            BASE_MAJOR=1
            BASE_MINOR=0
            HAS_TAGS=false
          else
            HAS_TAGS=true
            VERSION_NUM=${LATEST_TAG#v}
            VERSION_NUM=$(echo "$VERSION_NUM" | cut -d- -f1)
            
            if [[ "$VERSION_NUM" == *.* ]]; then
              BASE_MAJOR=$(echo "$VERSION_NUM" | cut -d. -f1)
              BASE_MINOR=$(echo "$VERSION_NUM" | cut -d. -f2)
            else
              BASE_MAJOR=$VERSION_NUM
              BASE_MINOR=0
            fi
          fi

          # Calculate target tag string
          if [ ! -z "$EXP_VERSION" ]; then
            TARGET_VERSION="$EXP_VERSION"
          else
            if [ "$HAS_TAGS" = "false" ]; then
              TARGET_VERSION="1"
            else
              NEW_MINOR=$((BASE_MINOR + 1))
              TARGET_VERSION="$BASE_MAJOR.$NEW_MINOR"
            fi
          fi

          # Universal Collision Firewall Loop
          FINAL_TAG="v$TARGET_VERSION"
          COUNTER=1
          BASE_TARGET_VERSION="$TARGET_VERSION"

          while git rev-parse "$FINAL_TAG" >/dev/null 2>&1; do
            echo "⚠️ Tag $FINAL_TAG already exists! Appending dynamic increment offset..."
            FINAL_TAG="v${BASE_TARGET_VERSION}-build${{ github.run_number }}-$COUNTER"
            COUNTER=$((COUNTER + 1))
          done
          
          echo "Final verified release target: $FINAL_TAG"
          echo "TAG_NAME=$FINAL_TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=Firmware V${FINAL_TAG#v}" >> $GITHUB_OUTPUT

      - name: Install PlatformIO Core CLI
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade platformio
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Dynamically Compile PlatformIO Firmware Targets
        id: pio_build
        run: |
          source .venv/bin/activate
          
          # Use secure sed parsing to pull target active environments cleanly
          DEFAULT_ENV=$(sed -n 's/^[[:space:]]*default_envs[[:space:]]*=[[:space:]]*\([^#[:space:]]*\).*/\1/p' platformio.ini | head -n 1)
          
          if [ -z "$DEFAULT_ENV" ]; then
            PIO_ENV=$(sed -n 's/^\[env:\([^]\s]*\)\].*/\1/p' platformio.ini | head -n 1)
          else
            PIO_ENV=$DEFAULT_ENV
          fi
          
          if [ -z "$PIO_ENV" ]; then
            echo "⚠️ Environment parsing unresolved. Defaulting safely to 'esp32dev'."
            PIO_ENV="esp32dev"
          fi
          
          echo "Selected Compilation Target Environment: $PIO_ENV"
          pio run -e "$PIO_ENV"
          
          echo "BINARY_PATH=.pio/build/$PIO_ENV/firmware.bin" >> $GITHUB_OUTPUT

      - name: Deploy Dynamic Release Configuration Page
        if: steps.versioning.outputs.SHOULD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pio_build.outputs.BINARY_PATH }}
          name: "${{ steps.versioning.outputs.RELEASE_NAME }}"
          tag_name: "${{ steps.versioning.outputs.TAG_NAME }}"
          prerelease: ${{ steps.versioning.outputs.IS_PRERELEASE }}
          body: |
            ## 🖥️ Automated Firmware Production Build
            This target firmware container was dynamically verified and successfully pushed via automated compilation channels.
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}